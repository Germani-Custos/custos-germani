name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, master]

jobs:
  quality:
    name: Lint, typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dev dependencies
        run: npm ci --include=dev
      - name: Verify ESLint executable
        run: |
          npm ls eslint
          npx eslint --version
          ls node_modules/.bin
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
